services:
  postgres:
    build:
      context: ./backend/docker/database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: wisa_crm
      POSTGRES_PASSWORD: wisa_crm_secret
      POSTGRES_DB: wisa_crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisa_crm -d wisa_crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_ENV: development
      DATABASE_URL: postgres://wisa_crm:wisa_crm_secret@postgres:5432/wisa_crm_db?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
