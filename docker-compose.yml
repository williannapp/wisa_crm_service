services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    build:
      context: ./backend/docker/database
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: wisa_crm
      POSTGRES_PASSWORD: wisa_crm_secret
      POSTGRES_DB: wisa_crm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisa_crm -d wisa_crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      APP_ENV: development
      DATABASE_URL: postgres://wisa_crm:wisa_crm_secret@postgres:5432/wisa_crm_db?sslmode=disable&options=-c%20search_path=wisa_crm_db
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /app/private.pem
      JWT_AUD_BASE_DOMAIN: wisa.labs.com.br
      REDIRECT_SCHEME: http
    volumes:
      - ./backend/private.pem:/app/private.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

  test-app-backend:
    build:
      context: ./test-app/backend
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      AUTH_SERVER_URL: http://auth.wisa.labs.com.br
      # Issuer deve coincidir com o claim iss do JWT emitido pelo auth backend
      JWT_ISSUER: wisa-crm-service
      TENANT_SLUG: lingerie-maria
      PRODUCT_SLUG: gestao-pocket
      APP_URL: http://lingerie-maria.wisa.labs.com.br
      FRONTEND_URL: http://lingerie-maria.wisa.labs.com.br

  test-app-frontend:
    build:
      context: ./test-app/frontend
      dockerfile: Dockerfile
    ports:
      - "4201:80"
    depends_on:
      - test-app-backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
      - test-app-backend
      - test-app-frontend
    networks:
      default:
        aliases:
          - auth.wisa.labs.com.br

volumes:
  postgres_data:
