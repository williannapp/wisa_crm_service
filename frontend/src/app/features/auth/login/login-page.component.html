<main class="login-page__container">
  <div class="login-page__overlay" aria-hidden="true"></div>
  <div class="login-page__card">
    <div class="login-page__card-bar"></div>
    <header class="login-page__card-header">
      <h1 class="login-page__card-title">Bem-vindo de volta</h1>
      <p class="login-page__card-description">
        Acesse sua conta Wisa Labs para continuar
      </p>
    </header>
    <div class="login-page__card-content">
      <form
        class="login-page__form"
        (ngSubmit)="onSubmit()"
        aria-label="Formulário de login"
      >
        <div class="login-page__field">
          <label class="login-page__label" for="username">Usuário</label>
          <div class="login-page__input-wrapper">
            <span class="login-page__input-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </span>
            <input
              id="username"
              type="text"
              class="login-page__input"
              [value]="username()"
              (input)="username.set($any($event.target).value)"
              placeholder="Seu nome de usuário"
              autocomplete="username"
              required
              data-testid="input-username"
            />
          </div>
        </div>
        <div class="login-page__field">
          <div class="login-page__label-row">
            <label class="login-page__label" for="password">Senha</label>
            <a
              href="#"
              class="login-page__link"
              (click)="$event.preventDefault()"
              aria-label="Esqueceu a senha?"
              data-testid="link-forgot-password"
              >Esqueceu a senha?</a
            >
          </div>
          <div class="login-page__input-wrapper">
            <span class="login-page__input-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect
                  x="3"
                  y="11"
                  width="18"
                  height="11"
                  rx="2"
                  ry="2"
                />
                <path
                  d="M7 11V7a5 5 0 0 1 10 0v4"
                />
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="login-page__input login-page__input--with-toggle"
              [value]="password()"
              (input)="password.set($any($event.target).value)"
              placeholder="••••••••"
              autocomplete="current-password"
              required
              data-testid="input-password"
            />
            <button
              type="button"
              class="login-page__toggle"
              (click)="toggleShowPassword()"
              [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
              data-testid="button-toggle-password"
            >
              @if (showPassword()) {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              } @else {
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              }
            </button>
          </div>
        </div>
        <button
          type="submit"
          class="login-page__submit"
          data-testid="button-login"
        >
          Entrar
        </button>
      </form>
    </div>
    <footer class="login-page__card-footer">
      <p>
        Ainda não tem uma conta?
        <a
          href="#"
          class="login-page__link"
          (click)="$event.preventDefault()"
          aria-label="Fale conosco"
          data-testid="link-contact"
          >Fale conosco</a
        >
      </p>
    </footer>
  </div>
</main>
